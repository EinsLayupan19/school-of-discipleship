<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School of Discipleship — Facilitator Management</title>
    <script>
      // Runs before React mounts, so there's no flash of the wrong theme.
      // Mirrors the logic in src/lib/theme.tsx — keep these two in sync.
      (function () {
        var stored = localStorage.getItem("sod-theme");
        var isDark =
          stored === "dark" ||
          (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", isDark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
